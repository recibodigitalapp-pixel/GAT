<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAT - Controle de Táxi</title>
    <style>
        :root {
            --primary: #f1c40f;
            --success: #27ae60;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--light);
            margin: 0; padding: 10px; color: var(--dark);
            -webkit-tap-highlight-color: transparent;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            transition: 0.3s ease; z-index: 9999; padding: 20px; box-sizing: border-box;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; text-align: center; }
        
        .menu-item { 
            padding: 15px; background: #f8f9fa; margin-bottom: 12px; border-radius: 10px; 
            cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; 
            align-items: center; border: 1px solid #eee; font-size: 0.9rem;
        }
        
        .overlay-menu { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); display: none; z-index: 9998; 
        }

        /* TOP BAR */
        .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; height: 50px; }
        .menu-icon { font-size: 1.4rem; cursor: pointer; background: var(--dark); color: white; padding: 8px 15px; border-radius: 10px; border: none; }
        .top-bar h2 { margin: 0; font-size: 1.6rem; letter-spacing: 2px; font-weight: 900; flex: 1; text-align: center; }

        /* HEADER RESUMO */
        .header-resumo { background: var(--dark); color: white; padding: 25px 15px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .header-resumo .total { font-size: 2.4rem; font-weight: bold; color: var(--primary); margin: 5px 0; }
        .stats { display: flex; justify-content: space-around; border-top: 1px solid #444; padding-top: 15px; margin-top: 15px; font-size: 0.9rem; }

        /* BOTÕES PRINCIPAIS */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .btn-main { border: none; padding: 18px; border-radius: 12px; font-size: 1rem; font-weight: bold; color: white; cursor: pointer; }
        .btn-receita { background-color: var(--success); }
        .btn-despesa { background-color: var(--danger); }

        /* LISTA */
        .list-container { background: white; border-radius: 20px; padding: 15px; min-height: 200px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .movimentacao { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f1f1f1; cursor: pointer; }

        /* MODAIS */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: none; align-items: center; 
            justify-content: center; z-index: 10000; padding: 15px; box-sizing: border-box;
        }
        .modal { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; box-sizing: border-box; position: relative; max-height: 90vh; overflow-y: auto; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; margin-bottom: 6px; font-weight: bold; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; font-family: inherit; }

        /* CONFIRMAÇÃO BONITA */
        .confirm-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-confirm { padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        
        .cat-item-list { list-style: none; padding: 0; margin: 10px 0; border: 1px solid #eee; border-radius: 10px; }
        .cat-item-list li { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div class="overlay-menu" id="overlayMenu" onclick="fecharMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 style="margin:0">GAT PRO</h2>
            <small>Configurações</small>
        </div>
        <div class="menu-item" onclick="abrirModalConfig('receita')">💰 Categorias Ganho <span>❯</span></div>
        <div class="menu-item" onclick="abrirModalConfig('despesa')">⛽ Categorias Gasto <span>❯</span></div>
        <button onclick="fecharMenu()" style="width:100%; padding:15px; margin-top:20px; border-radius:10px; border:none; background:var(--dark); color:white; font-weight:bold;">VOLTAR</button>
    </div>

    <div class="top-bar">
        <button class="menu-icon" onclick="abrirMenu()">☰</button>
        <h2>GAT</h2>
        <div style="width:45px"></div>
    </div>

    <div class="header-resumo">
        <div style="opacity: 0.8;">Saldo de Hoje</div>
        <div class="total" id="saldo-total">R$ 0,00</div>
        <div class="stats">
            <div>Ganhos<br><b id="total-receitas" style="color: var(--success)">R$ 0,00</b></div>
            <div>Gastos<br><b id="total-despesas" style="color: var(--danger)">R$ 0,00</b></div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-main btn-receita" onclick="abrirModalCadastro('receita')">+ Receita</button>
        <button class="btn-main btn-despesa" onclick="abrirModalCadastro('despesa')">- Despesa</button>
    </div>

    <div class="list-container">
        <h3 style="margin:0 0 15px 0;">Movimentações de Hoje</h3>
        <div id="lista-movimentacoes"></div>
    </div>

    <!-- MODAL CADASTRO COM DATAPICKER -->
    <div class="modal-overlay" id="modalCadastro">
        <div class="modal">
            <h2 id="tituloCadastro" style="margin-top:0">Novo Registro</h2>
            
            <div class="form-group">
                <label>Data</label>
                <input type="date" id="dataInput">
            </div>

            <div class="form-group">
                <label>Valor (R$)</label>
                <input type="text" id="valorInput" inputmode="decimal" oninput="mascaraMoeda(this)" placeholder="0,00">
            </div>

            <div class="form-group">
                <label>Categoria</label>
                <select id="categoriaSelect"></select>
            </div>

            <div class="form-group">
                <label>Observação (Opcional)</label>
                <input type="text" id="obsInput" placeholder="Ex: Corrida do centro">
            </div>

            <button class="btn-main" style="background:var(--dark); width:100%;" onclick="salvarMovimento()">SALVAR</button>
            <button class="btn-main" style="background:none; color: #999; width:100%; margin-top:10px;" onclick="fecharModais()">Cancelar</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalConfig">
        <div class="modal">
            <h2 id="tituloConfig">Categorias</h2>
            <ul class="cat-item-list" id="listaCategoriasConfig"></ul>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="novaCatInput" placeholder="Novo nome...">
                <button onclick="addCategoria()" style="background:var(--success); color:white; border:none; padding:10px; border-radius:8px;">+</button>
            </div>
            <button class="btn-main" style="background:var(--dark); width:100%; margin-top:20px;" onclick="fecharModais()">FECHAR</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalConfirmacao">
        <div class="modal" style="max-width: 300px; text-align: center;">
            <h3 style="margin-top:0">Remover?</h3>
            <p style="color:#666">Deseja excluir esta categoria?</p>
            <div class="confirm-btns">
                <button class="btn-confirm" style="background:#eee;" onclick="fecharConfirmacao()">NÃO</button>
                <button class="btn-confirm" style="background:var(--danger); color:white;" id="btnConfirmarExclusao">SIM</button>
            </div>
        </div>
    </div>

    <script>
        // Versão do banco de dados alterada para garantir compatibilidade com novos campos
        let movimentacoes = JSON.parse(localStorage.getItem('gat_mov_v10')) || [];
        let categorias = JSON.parse(localStorage.getItem('gat_cat_v10')) || {
            receita: ['Corrida App', 'Corrida Rua', 'Particular'],
            despesa: ['Combustível', 'Alimentação', 'Manutenção']
        };
        let tipoAtual = '';
        let indexParaRemover = null;

        function abrirMenu() { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlayMenu').style.display = 'block'; }
        function fecharMenu() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlayMenu').style.display = 'none'; }
        function fecharModais() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none'); }
        function fecharConfirmacao() { document.getElementById('modalConfirmacao').style.display = 'none'; }

        function mascaraMoeda(i) {
            let v = i.value.replace(/\D/g,'');
            v = (v/100).toFixed(2) + '';
            v = v.replace(".", ",");
            v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
            i.value = v;
        }

        function abrirModalCadastro(tipo) {
            tipoAtual = tipo;
            document.getElementById('tituloCadastro').innerText = tipo === 'receita' ? 'Nova Receita' : 'Nova Despesa';
            
            // Preenche o seletor de categorias
            const select = document.getElementById('categoriaSelect');
            select.innerHTML = '';
            categorias[tipo].forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
            
            // Reseta campos
            document.getElementById('valorInput').value = '';
            document.getElementById('obsInput').value = '';
            
            // Define a data de hoje como padrão no input
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('dataInput').value = hoje;
            
            document.getElementById('modalCadastro').style.display = 'flex';
        }

        function salvarMovimento() {
            const valStr = document.getElementById('valorInput').value;
            const dataSel = document.getElementById('dataInput').value;
            const valor = parseFloat(valStr.replace(/\./g, '').replace(',', '.'));
            
            if(!valor) return alert("Insira um valor!");
            if(!dataSel) return alert("Selecione uma data!");

            movimentacoes.unshift({
                id: Date.now(), 
                tipo: tipoAtual, 
                valor: valor,
                categoria: document.getElementById('categoriaSelect').value,
                obs: document.getElementById('obsInput').value,
                data: dataSel // Salva a data escolhida pelo usuário
            });

            localStorage.setItem('gat_mov_v10', JSON.stringify(movimentacoes));
            fecharModais(); 
            render();
        }

        // --- CATEGORIAS ---
        function abrirModalConfig(tipo) {
            tipoAtual = tipo; fecharMenu();
            renderCategorias();
            document.getElementById('modalConfig').style.display = 'flex';
        }

        function renderCategorias() {
            const lista = document.getElementById('listaCategoriasConfig');
            lista.innerHTML = '';
            categorias[tipoAtual].forEach((c, idx) => {
                lista.innerHTML += `<li>${c} <button onclick="solicitarRemocao(${idx})" style="border:none; background:none; color:var(--danger); font-weight:bold;">✕</button></li>`;
            });
        }

        function solicitarRemocao(idx) {
            indexParaRemover = idx;
            document.getElementById('modalConfirmacao').style.display = 'flex';
            document.getElementById('btnConfirmarExclusao').onclick = function() {
                categorias[tipoAtual].splice(indexParaRemover, 1);
                localStorage.setItem('gat_cat_v10', JSON.stringify(categorias));
                renderCategorias(); fecharConfirmacao();
            };
        }

        function addCategoria() {
            const val = document.getElementById('novaCatInput').value;
            if(val) {
                categorias[tipoAtual].push(val);
                document.getElementById('novaCatInput').value = '';
                localStorage.setItem('gat_cat_v10', JSON.stringify(categorias));
                renderCategorias();
            }
        }

        // --- RENDER LISTA PRINCIPAL (Filtrado por data de hoje por padrão) ---
        function render() {
            const lista = document.getElementById('lista-movimentacoes');
            const hoje = new Date().toISOString().split('T')[0];
            let e = 0, s = 0;
            
            lista.innerHTML = '';
            
            // Filtra o que aparece na tela inicial (somente o que foi cadastrado como 'hoje')
            const filtrados = movimentacoes.filter(m => m.data === hoje);

            if(filtrados.length === 0) {
                lista.innerHTML = '<p style="text-align:center; color:#999; padding:20px;">Nenhuma movimentação hoje.</p>';
            }

            filtrados.forEach(m => {
                if(m.tipo === 'receita') e += m.valor; else s += m.valor;
                lista.innerHTML += `
                    <div class="movimentacao">
                        <div><b>${m.categoria}</b><br><small style="color:#888">${m.obs || ''}</small></div>
                        <div style="text-align:right">
                            <div style="font-weight:bold; color:${m.tipo==='receita'?'var(--success)':'var(--danger)'}">
                                ${m.tipo==='receita'?'+':'-'} R$ ${m.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}
                            </div>
                        </div>
                    </div>`;
            });

            document.getElementById('total-receitas').innerText = `R$ ${e.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
            document.getElementById('total-despesas').innerText = `R$ ${s.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
            document.getElementById('saldo-total').innerText = `R$ ${(e-s).toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
        }

        render();
    </script>
</body>
</html>
